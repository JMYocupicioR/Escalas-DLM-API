name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Netlify functions
        run: npm run build:functions

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --ci
        env:
          EXPO_NO_TELEMETRY: '1'
          CI: 'true'

