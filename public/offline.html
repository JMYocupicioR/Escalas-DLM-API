<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sin Conexión — Escalas DLM</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:#0f172a;
      color:#e2e8f0;
      text-align:center;
      padding:24px;
    }
    .container{max-width:420px}
    .icon{
      width:80px;height:80px;margin:0 auto 24px;
      background:linear-gradient(135deg,#0891b2,#06b6d4);
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 40px rgba(8,145,178,0.3);
    }
    .icon svg{width:40px;height:40px}
    h1{font-size:1.5rem;font-weight:700;margin-bottom:8px;color:#f1f5f9}
    p{font-size:1rem;color:#94a3b8;line-height:1.6;margin-bottom:24px}
    .btn{
      display:inline-block;
      padding:12px 32px;
      background:linear-gradient(135deg,#0891b2,#06b6d4);
      color:#fff;font-weight:600;font-size:0.95rem;
      border:none;border-radius:12px;cursor:pointer;
      text-decoration:none;
      transition:transform 0.15s,box-shadow 0.15s;
    }
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(8,145,178,0.4)}
    .btn:active{transform:translateY(0)}
    .brand{margin-top:40px;font-size:0.8rem;color:#475569}
    .pulse{animation:pulse 2s infinite}
    @keyframes pulse{
      0%,100%{opacity:1}
      50%{opacity:0.6}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon pulse">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>Sin Conexión a Internet</h1>
    <p>No tienes conexión en este momento. Las escalas que ya visitaste están disponibles offline. Intenta recargar cuando tengas conexión.</p>
    <button class="btn" onclick="window.location.reload()">Reintentar</button>
    <div class="brand">Escalas DLM — DeepLux Med</div>
  </div>
</body>
</html>
